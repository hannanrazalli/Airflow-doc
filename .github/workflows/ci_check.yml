name: Data_Pipeline_CI_Check

on:
  pull_request:
    branches: [main]

jobs:
  ci_validation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install dbt-bigquery pytest

      - name: Validate dbt Models (Dry Run)
        run: |
          cd include/dbt/oms_dbt_proj
          
          # 1. Download packages dulu (Wajib sebab kau ada packages.yml)
          # Kita letak dummy profiles supaya dia tak bising masa deps
          echo "oms_dbt_proj:
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: dummy
                dataset: dummy
                threads: 1
                keyfile: dummy.json
            target: dev" > profiles.yml
            
          dbt deps --profiles-dir .
          
          # 2. Buat fail json kosong (supaya compile tak fail)
          touch dummy.json
          
          # 3. Baru run compile
          dbt compile --profiles-dir .
        env:
          DBT_PROFILES_DIR: .

      - name: Airflow DAG Integrity Test
        run: |
          # Check kalau DAG Airflow kau ada syntax error
          export AIRFLOW_HOME=$(pwd)
          pytest tests/test_dag_integrity.py