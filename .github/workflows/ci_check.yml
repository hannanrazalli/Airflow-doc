name: Data_Pipeline_CI_Check

on:
  pull_request:
    branches: [main]

jobs:
  ci_validation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install dbt-bigquery pytest

      - name: Validate dbt Models (Dry Run)
        run: |
          cd include/dbt/oms_dbt_proj
          
          # 1. Cipta dummy profile (Maintain yang lama)
          echo "oms_dbt_proj:
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: dummy-project
                dataset: dummy-dataset
                threads: 1
                keyfile: dummy.json
            target: dev" > profiles.yml
            
          # 2. INSTALL DEPS (Penting!)
          dbt deps --profiles-dir .
          
          # 3. FIX: Buat fail JSON yang SAH (bukan kosong)
          echo "{}" > dummy.json
          
          # 4. RUN COMPILE
          dbt compile --profiles-dir .
        env:
          DBT_PROFILES_DIR: .

      - name: Airflow DAG Integrity Test
        run: |
          # Check kalau DAG Airflow kau ada syntax error
          export AIRFLOW_HOME=$(pwd)
          pytest tests/test_dag_integrity.py