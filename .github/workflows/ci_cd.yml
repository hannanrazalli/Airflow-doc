name: Enterprise_Data_Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- STAGE 1: CI (Continuous Integration) ---
  # Job ini lari setiap kali kau push atau buat PR ke main
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Memastikan pytest, airflow, cosmos, dan dbt di-install dalam VM
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Airflow DAG Integrity Test
        # Menjalankan inspektor .py untuk check syntax & owner
        run: pytest tests/test_dag_integrity.py

      - name: dbt Compile Check
        # Memastikan model SQL dbt kau tak ada syntax error tanpa run data
        run: |
          cd include/dbt/oms_dbt_proj
          dbt deps
          dbt compile

  # --- STAGE 2: CD (Continuous Deployment) ---
  # Job ini HANYA lari lepas PR di-merge masuk ke main
  deploy_prod:
    needs: run_tests                # Wajib lulus test baru boleh deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Deploy to BigQuery Production
        env:
          # Menggunakan rahsia yang kau simpan kat GitHub Secrets
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > gcp-key.json
          cd include/dbt/oms_dbt_proj
          dbt deps
          # Menjalankan transformasi data sebenar di BigQuery
          dbt run --target prod --full-refresh --profiles-dir .