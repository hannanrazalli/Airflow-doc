name: Data_Pipeline_Enterprise_CI_CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration_tests:  # Guna nama ni supaya "Required check" tu hijau
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install apache-airflow dbt-bigquery astronomer-cosmos

      - name: Run dbt Ingest to Prod
        run: |
          cd include/dbt/oms_dbt_proj
          # Gunakan Secrets untuk GCP Key
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json
          
          # Bina profile yang tembak terus ke dataset PROD
          echo "oms_dbt_proj:
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: transactions-practice
                dataset: bronze_prod
                threads: 4
                keyfile: gcp-key.json
                location: asia-southeast1
            target: prod" > profiles.yml
          
          dbt deps
          # INI ADALAH COMMAND YANG AKAN MASUKKAN DATA
          dbt run --target prod