name: Enterprise_Data_Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- STAGE 1: CI (Jalan untuk PR & Push) ---
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Airflow DAG Integrity Test
        run: pytest tests/test_dag_integrity.py

      - name: dbt Syntax & Compile Check
        run: |
          cd include/dbt/oms_dbt_proj
          dbt deps
          dbt compile # Check SQL logic tanpa run data

  # --- STAGE 2: CD (Jalan HANYA lepas Merge ke Main) ---
  deploy_prod:
    needs: run_tests                # WAJIB lepas test hijau baru jalan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup dbt & Deploy
        run: |
          cd include/dbt/oms_dbt_proj
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json
          # (Profile setup kau kat sini)
          dbt deps
          dbt run --target prod --full-refresh